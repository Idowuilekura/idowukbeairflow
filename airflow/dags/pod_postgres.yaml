apiVersion: v1
kind: Pod
metadata:
  name: python-postgres-tester
  namespace: airflow
spec:
  restartPolicy: Never
  containers:
    - name: python-container
      image: python:3.10-slim
      command: ["python", "-c"]
      args:
        - |
          import os
          import subprocess
          import sys
          import time

          # Install psycopg2-binary for postgres connection
          print("Installing psycopg2-binary...")
          subprocess.check_call([sys.executable, "-m", "pip", "install", "psycopg2-binary", "--quiet"])

          import psycopg2


          host = os.environ.get("POSTGRES_HOST", "postgres")
          db = os.environ.get("POSTGRES_DB", "hive_metastore")
          user = os.environ.get("POSTGRES_USER", "hive")
          password = os.environ.get("POSTGRES_PASSWORD", "hivepass123")

          print(f"Connecting to postgres at {host}...")
          
          retries = 5
          while retries > 0:
              try:
                  conn = psycopg2.connect(
                      host=host,
                      database=db,
                      user=user,
                      password=password,
                      connect_timeout=5
                  )
                  cur = conn.cursor()
                  cur.execute("SELECT version();")
                  version = cur.fetchone()
                  print("Successfully spoke to Postgres!")
                  print("Postgres Version:", version[0])
                  cur.close()
                  conn.close()
                  break
              except Exception as e:
                  print(f"Failed to connect: {e}. Retrying in 5s...")
                  retries -= 1
                  time.sleep(5)
          else:
              print("Could not connect to Postgres after several attempts.")
              sys.exit(1)
      env:
        - name: POSTGRES_HOST
          value: "postgres"
        - name: POSTGRES_DB
          value: "hive_metastore"
        - name: POSTGRES_USER
          value: "hive"
        - name: POSTGRES_PASSWORD
          value: "hivepass123"
